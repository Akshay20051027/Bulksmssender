<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VEMACS SMS Sender</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1b2a;
      --panel: #12263a;
      --accent: #4ad295;
      --text: #f5f7fb;
      --muted: #b5c6e0;
      --danger: #ef476f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(120% 140% at 30% 20%, rgba(74, 210, 149, 0.18), transparent),
                  radial-gradient(120% 140% at 80% 10%, rgba(239, 71, 111, 0.12), transparent),
                  var(--bg);
      font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: min(960px, 100%);
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      border-radius: 20px;
      padding: 28px;
      display: grid;
      gap: 20px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }
    .header {
      grid-column: 1 / -1;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      flex-wrap: wrap;
    }
    h1 {
      margin: 0;
      font-size: 26px;
      letter-spacing: -0.4px;
    }
    p {
      margin: 0;
      color: var(--muted);
    }
    form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      grid-column: 1 / -1;
    }
    label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 14px;
      color: var(--muted);
    }
    input {
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border 0.2s ease, background 0.2s ease;
    }
    input:focus {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.07);
    }
    .actions {
      grid-column: 1 / -1;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    button {
      padding: 12px 18px;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    .primary {
      background: var(--accent);
      color: #072412;
      box-shadow: 0 10px 30px rgba(74, 210, 149, 0.25);
    }
    .primary:hover { transform: translateY(-1px); }
    .ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }
    .status {
      grid-column: 1 / -1;
      padding: 14px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px dashed rgba(255, 255, 255, 0.08);
      font-size: 14px;
      color: var(--muted);
    }
    .status.success { border-color: rgba(74, 210, 149, 0.6); color: #9ef0c3; }
    .status.error { border-color: rgba(239, 71, 111, 0.6); color: #ffc2d0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div>
        <h1>VEMACS SMS Sender</h1>
        <p>Send the approved monthly balance template directly from the secured backend (Port 5000).</p>
      </div>
    </div>

    <form id="sms-form">
      <label>
        Member Name
        <input name="name" placeholder="e.g., Sita Raman" required />
      </label>
      <label>
        Mobile Number
        <input name="mobile" placeholder="10-digit mobile" pattern="[0-9]{10}" required />
      </label>
      <label>
        Thrift Balance
        <input name="thriftBalance" type="number" step="0.01" placeholder="0" required />
      </label>
      <label>
        Loan Balance
        <input name="loanBalance" type="number" step="0.01" placeholder="0" required />
      </label>
      <label>
        Surety Signatures
        <input name="suretySignatures" type="number" min="0" placeholder="0" required />
      </label>
      <label>
        Dividend (optional)
        <input name="dividend" type="number" step="0.01" placeholder="0" />
      </label>
      <div class="actions">
        <button class="primary" type="submit">Send SMS</button>
        <button class="ghost" type="reset">Clear</button>
      </div>
    </form>

    <div id="status" class="status">Awaiting input…</div>
  </div>

  <script>
    const form = document.getElementById('sms-form');
    const statusEl = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      statusEl.textContent = 'Sending…';
      statusEl.className = 'status';

      const formData = new FormData(form);
      const payload = Object.fromEntries(formData.entries());
      payload.thriftBalance = Number(payload.thriftBalance);
      payload.loanBalance = Number(payload.loanBalance);
      payload.suretySignatures = Number(payload.suretySignatures);
      payload.dividend = payload.dividend ? Number(payload.dividend) : 0;

      try {
        const res = await fetch('/api/send-sms', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Unknown error');

        statusEl.textContent = `Sent! Message ID: ${data.messageId}`;
        statusEl.className = 'status success';
      } catch (err) {
        statusEl.textContent = `Failed: ${err.message}`;
        statusEl.className = 'status error';
      }
    });
  </script>
</body>
</html>
